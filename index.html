function useIsMobile(){

    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);
  return m;
}

function ContactPage(){
  const m=useIsMobile();
  const [step,setStep]=useState(1);

    firstName:"",lastName:"",email:"",phone:"",

  const [done,setDone]=useState(false);
  const [errors,setErrors]=useState({});
  const up=v=>setForm(f=>({...f,...v}));

  const now=new Date();
  const currentYear=now.getFullYear();
  const currentMonth=now.getMonth(); // 0-indexed
  const years=["2025","2026","2027","2028"].filter(y=>parseInt(y)>=currentYear);
  const allMonths=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const months=form.year===String(currentYear)
    ? allMonths.filter((_,i)=>i>=currentMonth)
    : allMonths;
  const budgetOptions=["Under Php 50,000","Php 50,000–200,000","Php 200,000–500,000","Over Php 500,000"];

  const validateStep1=()=>{
    const e={};
    if(!form.firstName.trim()) e.firstName="First name is required";
    if(!form.lastName.trim()) e.lastName="Last name is required";
    const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!form.email.trim()) e.email="Email is required";
    else if(!emailRe.test(form.email)) e.email="Please enter a valid email address";
    const phoneRe=/^\+?[\d\s\-()]{7,20}$/;
    if(!form.phone.trim()) e.phone="Phone number is required";
    else if(!phoneRe.test(form.phone)) e.phone="Please enter a valid phone number";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const toggleProc=(label)=>{
    const arr=form.procedures.includes(label)
      ?form.procedures.filter(p=>p!==label)
      :[...form.procedures,label];
    up({procedures:arr});

    border:`1.5px solid ${T.grayLine}`,fontSize:15,
    boxSizing:"border-box",color:T.navy,outline:"none"};

          <p style={{margin:0,color:T.skyDark,fontSize:14}}>
            💬 Reach us anytime: <strong>WhatsApp +63 917 160 3020</strong>
          </p>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:T.offWhite}}>
      <div style={{position:"relative",backgroundImage:"url(https://images.unsplash.com/photo-1559757175-5700dde675bc?w=1400&q=80)",
        backgroundSize:"cover",backgroundPosition:"center",padding:m?"40px 20px 32px":"64px 32px 52px"}}>
        <div style={{position:"absolute",inset:0,background:`${T.navy}CC`}}/>
        <div style={{position:"relative",maxWidth:700,margin:"0 auto",textAlign:"center"}}>
          <h2 style={{fontSize:m?28:44,fontWeight:900,color:T.white,marginBottom:10,letterSpacing:"-0.02em"}}>Free Consultation</h2>
          <p style={{color:"rgba(255,255,255,0.68)",fontSize:m?14:17}}>No commitment. Our coordinator responds within 24 hours.</p>
        </div>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:m?"24px 16px":"52px 28px"}}>

              <span key={l} style={{fontSize:m?11:13,fontWeight:step===i+1?700:400,
                color:step>i?T.skyDark:step===i+1?T.navy:T.grayText}}>{i+1}. {m?l.split(" ")[0]:l}</span>
            ))}
          </div>
          <div style={{height:6,background:T.grayLine,borderRadius:3}}>
            <div style={{height:"100%",width:`${(step/3)*100}%`,background:T.sky,borderRadius:3,transition:"width 0.4s"}}/>
          </div>

        <div style={{background:T.white,borderRadius:24,padding:m?"24px 20px":"38px 40px",border:`1.5px solid ${T.grayLine}`}}>

                  <input type="text" placeholder="Maria" value={form.firstName}

                    style={{...inp,borderColor:errors.firstName?"#E05555":T.grayLine}}/>
                  {errors.firstName&&<div style={{color:"#E05555",fontSize:12,marginTop:5}}>{errors.firstName}</div>}

              <div>

                    // reset month if it's now in the past for the selected year
                    const mIdx=allMonths.indexOf(form.month);
                    if(y===String(currentYear)&&mIdx>=0&&mIdx<currentMonth){
                      up({year:y,month:""});
                    } else {
                      up({year:y});
                    }
                  }} style={inp}>
                    <option value="">Year...</option>
                    {years.map(y=><option key={y}>{y}</option>)}
                  </select>
                  <select value={form.month} onChange={e=>up({month:e.target.value})} style={inp}>
                    <option value="">Month...</option>
                    {months.map(mo=><option key={mo}>{mo}</option>)}

                </div>
              </div>

              {/* Goals */}
              <div style={{marginBottom:20}}>
                <label style={lbl}>Goals & Expectations</label>

                  style={{...inp,resize:"vertical",minHeight:90}}/>

              {/* Medical Notes */}
              <div style={{marginBottom:20}}>

                  placeholder="Any medical history, allergies, or notes the coordinator should know..."
                  style={{...inp,resize:"vertical",minHeight:80}}/>
              </div>

              {/* Photo upload */}
              <div>
                <label style={lbl}>Attach Photos <span style={{color:T.grayText,fontWeight:400}}>(optional, up to 5)</span></label>
                <div style={{border:`2px dashed ${T.grayLine}`,borderRadius:12,padding:"22px",
                  textAlign:"center",background:T.offWhite}}>
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/heic" multiple id="photo-upload"

                      const valid=Array.from(e.target.files)

                      <button key={o} onClick={()=>up({addons:{...form.addons,interpreter:o}})}

                      <button key={o} onClick={()=>up({addons:{...form.addons,accommodation:o}})}

                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["None","4-seater","6-seater"].map(o=>{
                    const sel=form.addons.pickup===o;
                    return(
                      <button key={o} onClick={()=>up({addons:{...form.addons,pickup:o}})}
                        style={{padding:"8px 16px",borderRadius:30,cursor:"pointer",fontSize:12,fontWeight:700,

                          border:`1.5px solid ${sel?T.sky:T.grayLine}`}}>{o}</button>
                    );

                </div>
              </div>

              {/* WhatsApp notice */}

                <p style={{margin:0,color:T.skyDark,fontSize:14}}>

            </div>
          )}

          {/* Navigation */}
          <div style={{display:"flex",gap:14,marginTop:34}}>
            {step>1&&(
              <button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"14px",

                cursor:"pointer",fontWeight:700,fontSize:15,color:T.grayText}}>← Back</button>
            )}
            <button onClick={()=>{
                if(step===1){
                  if(!validateStep1()) return;
                  setStep(2);
                } else if(step<3){setStep(s=>s+1);}
                else{
                  const a=form.addons;
                  const addonLines=[
                    a.visa==="Yes"?"✅ Visa Assistance (₱4,000)":null,
                    a.interpreter!=="None"?`✅ Interpreter — ${a.interpreter}`:null,
                    a.accommodation==="Yes"?"✅ Accommodation Assistance (₱2,000)":null,
                    a.pickup!=="None"?`✅ Airport Pickup — ${a.pickup}`:null,
                  ].filter(Boolean);
                  const msg=[
                    "📋 *New Consultation Inquiry — DR.KONNECT*",
                    "",
                    `👤 *Name:* ${form.firstName} ${form.lastName}`,
                    `📧 *Email:* ${form.email}`,
                    `📱 *Phone/WhatsApp:* ${form.phone}`,
                    "",
                    `💉 *Procedures:* ${form.procedures.length?form.procedures.join(", "):"—"}`,
                    `💰 *Budget:* ${form.budget||"—"}`,
                    `📅 *Timeline:* ${form.month&&form.year?form.month+" "+form.year:form.year||"—"}`,
                    "",
                    `📝 *Goals:* ${form.goals||"—"}`,
                    `🏥 *Medical Notes:* ${form.medicalNotes||"—"}`,
                    "",
                    addonLines.length?"➕ *Add-Ons:*\n"+addonLines.join("\n"):"➕ *Add-Ons:* None",
                  ].join("\n");
                  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`,"_blank");
                  setDone(true);
                }
              }}
              style={{flex:2,padding:"14px",background:T.sky,border:"none",
                borderRadius:14,cursor:"pointer",fontWeight:900,fontSize:16,color:T.navy}}>
              {step<3?"Continue →":"Submit Inquiry 🎯"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Booking Modal ───────────────────────────────────────────────
function BookingModal({onClose,onConfirm}){
  const today=new Date();
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());
  const [selDate,setSelDate]=useState(null);
  const [selTime,setSelTime]=useState(null);
  const [done,setDone]=useState(false);

  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const timeSlots=["09:00 AM","10:00 AM","11:00 AM","01:00 PM","02:00 PM","03:00 PM","04:00 PM"];

  const prevMonth=()=>{
    if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}
    else setViewMonth(m=>m-1);
    setSelDate(null);setSelTime(null);
  };
  const nextMonth=()=>{
    if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}
    else setViewMonth(m=>m+1);
    setSelDate(null);setSelTime(null);
  };

  const isPast=(d)=>{
    const dt=new Date(viewYear,viewMonth,d);
    dt.setHours(0,0,0,0);
    const t=new Date();t.setHours(0,0,0,0);
    return dt<t;
  };

  if(done) return(
    <div style={{position:"fixed",inset:0,background:"rgba(13,27,42,0.55)",zIndex:500,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:T.white,borderRadius:24,padding:"52px 40px",maxWidth:420,
        width:"100%",textAlign:"center",boxShadow:"0 24px 64px rgba(13,27,42,0.18)"}}>
        <div style={{fontSize:56,marginBottom:18}}>✅</div>
        <h3 style={{fontSize:24,fontWeight:900,color:T.navy,marginBottom:12}}>Appointment Requested!</h3>
        <p style={{color:T.grayText,lineHeight:1.7,marginBottom:8}}>
          <strong style={{color:T.navy}}>{monthNames[viewMonth]} {selDate}, {viewYear}</strong> at <strong style={{color:T.navy}}>{selTime}</strong>
        </p>
        <p style={{color:T.grayText,fontSize:14,lineHeight:1.7,marginBottom:28}}>
          Our coordinator will confirm via WhatsApp within 24 hours.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <button onClick={()=>{onConfirm&&onConfirm();}} style={{background:T.sky,color:T.navy,border:"none",
            borderRadius:14,padding:"14px 36px",fontWeight:900,fontSize:15,cursor:"pointer"}}>
            Continue to Inquiry Form →
          </button>
          <button onClick={onClose} style={{background:"none",color:T.grayText,
            border:`1.5px solid ${T.grayLine}`,borderRadius:14,padding:"13px 36px",
            fontWeight:700,fontSize:14,cursor:"pointer"}}>
            Done
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(13,27,42,0.55)",zIndex:500,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:T.white,borderRadius:24,padding:"36px 32px",maxWidth:480,
        width:"100%",boxShadow:"0 24px 64px rgba(13,27,42,0.18)",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"none",
          border:"none",cursor:"pointer",fontSize:22,color:T.grayText}}>✕</button>
        <h3 style={{fontSize:22,fontWeight:900,color:T.navy,marginBottom:4}}>Book In-Person Visit</h3>
        <p style={{color:T.grayText,fontSize:14,marginBottom:24}}>Select a date and time for your consultation.</p>

        {/* Calendar */}
        <div style={{background:T.offWhite,borderRadius:16,padding:"20px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",
              fontSize:18,color:T.grayText,padding:"4px 10px"}}>‹</button>
            <span style={{fontWeight:800,color:T.navy,fontSize:15}}>{monthNames[viewMonth]} {viewYear}</span>
            <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",
              fontSize:18,color:T.grayText,padding:"4px 10px"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
              <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:T.grayText,padding:"4px 0"}}>{d}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {Array(firstDay).fill(null).map((_,i)=><div key={"e"+i}/>)}
            {Array(daysInMonth).fill(null).map((_,i)=>{
              const d=i+1;
              const past=isPast(d);
              const sel=selDate===d;
              return(
                <button key={d} onClick={()=>{if(!past){setSelDate(d);setSelTime(null);}}}
                  style={{padding:"8px 2px",borderRadius:10,border:"none",cursor:past?"not-allowed":"pointer",
                    background:sel?T.navy:past?"transparent":"transparent",
                    color:sel?T.white:past?T.grayLine:T.navy,
                    fontWeight:sel?800:500,fontSize:13,
                    outline:sel?"none":(selDate===d?"none":"none"),
                    transition:"background 0.15s",
                    ...((!past&&!sel)?{":hover":{background:T.skyPale}}:{})
                  }}
                  onMouseEnter={e=>{if(!past&&!sel)e.currentTarget.style.background=T.skyPale;}}
                  onMouseLeave={e=>{if(!past&&!sel)e.currentTarget.style.background="transparent";}}>
                  {d}
                </button>
              );
            })}
          </div>
        </div>

        {/* Time Slots */}
        {selDate&&(
          <div style={{marginBottom:24}}>
            <p style={{fontWeight:700,color:T.navy,fontSize:14,marginBottom:12}}>Available Times</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {timeSlots.map(t=>(
                <button key={t} onClick={()=>setSelTime(t)}
                  style={{padding:"9px 18px",borderRadius:30,border:`1.5px solid ${selTime===t?T.navy:T.grayLine}`,
                    background:selTime===t?T.navy:"transparent",color:selTime===t?T.white:T.navy,
                    fontWeight:600,fontSize:13,cursor:"pointer"}}>
                  {t}
                </button>
              ))}
            </div>
          </div>

// ── Currency Calculator Modal ────────────────────────────────────
function CurrencyModal({onClose}){
  const [amount,setAmount]=useState("100,000");
  const [rate,setRate]=useState(null);
  const [loading,setLoading]=useState(true);
  const [lastUpdated,setLastUpdated]=useState("");
  const [dir,setDir]=useState("KRW_PHP");

  useEffect(()=>{
    fetch("https://api.exchangerate-api.com/v4/latest/KRW")
      .then(r=>r.json())
      .then(data=>{
        setRate(data.rates.PHP);
        setLastUpdated(data.date);
        setLoading(false);
      })
      .catch(()=>{
        setRate(0.042);
        setLastUpdated("(offline fallback)");
        setLoading(false);
      });
  },[]);

  const num=parseFloat(String(amount).replace(/,/g,""))||0;
  const converted=rate
    ?(dir==="KRW_PHP"?(num*rate).toFixed(2):(num/rate).toFixed(0))
    :"—";
  const fromLabel=dir==="KRW_PHP"?"KRW (₩)":"PHP (₱)";
  const toLabel=dir==="KRW_PHP"?"PHP (₱)":"KRW (₩)";
  const toSymbol=dir==="KRW_PHP"?"₱":"₩";

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(13,27,42,0.72)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:600,padding:24}}
      onClick={onClose}>
      <div style={{background:T.white,borderRadius:24,padding:"36px 36px",
        maxWidth:380,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.28)",position:"relative"}}
        onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:16,
          background:"none",border:"none",cursor:"pointer",fontSize:22,color:T.grayText}}>✕</button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:22}}>
          <div style={{width:40,height:40,borderRadius:12,background:T.skyPale,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke={T.skyDark} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/>
              <line x1="8" y1="10" x2="10" y2="10"/>
              <line x1="14" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="10" y2="14"/>
              <line x1="14" y1="14" x2="16" y2="14"/>
              <line x1="8" y1="18" x2="10" y2="18"/>
              <line x1="14" y1="18" x2="16" y2="18"/>
            </svg>
          </div>
          <h3 style={{fontWeight:900,color:T.navy,fontSize:19,margin:0}}>Currency Calculator</h3>
        </div>

        {/* Direction toggle */}
        <div style={{display:"flex",background:T.offWhite,borderRadius:12,padding:4,marginBottom:20}}>
          {[["KRW_PHP","🇰🇷 KRW → PHP 🇵🇭"],["PHP_KRW","🇵🇭 PHP → KRW 🇰🇷"]].map(([val,label])=>(
            <button key={val} onClick={()=>setDir(val)}
              style={{flex:1,padding:"10px 6px",borderRadius:9,border:"none",cursor:"pointer",
                fontWeight:700,fontSize:12,
                background:dir===val?T.white:"transparent",
                color:dir===val?T.navy:T.grayText,
                boxShadow:dir===val?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {label}
            </button>
          ))}
        </div>

        {/* Amount input */}
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:11,fontWeight:800,color:T.grayText,
            letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{fromLabel}</label>
          <input type="text" value={amount}
            onChange={e=>{
              const raw=e.target.value.replace(/[^0-9]/g,"");
              if(!raw){setAmount("");return;}
              setAmount(parseInt(raw,10).toLocaleString());
            }}
            style={{width:"100%",padding:"14px 16px",borderRadius:12,
              border:`1.5px solid ${T.grayLine}`,fontSize:20,fontWeight:700,
              color:T.navy,boxSizing:"border-box",outline:"none"}}/>
        </div>

        {/* Result */}
        <div style={{background:T.skyPale,borderRadius:16,padding:"22px",
          textAlign:"center",border:`1.5px solid ${T.skyLight}`,marginBottom:14}}>
          <div style={{color:T.grayText,fontSize:11,fontWeight:800,
            letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{toLabel} EQUIVALENT</div>
          {loading?(
            <div style={{color:T.grayText,fontSize:16}}>Loading live rate...</div>
          ):(
            <div style={{color:T.navy,fontWeight:900,fontSize:34,letterSpacing:"-0.02em"}}>
              {toSymbol}{parseFloat(converted).toLocaleString()}
            </div>
          )}
        </div>

        {/* Rate info */}
        {!loading&&rate&&(
          <p style={{textAlign:"center",color:T.grayText,fontSize:11,margin:0,lineHeight:1.6}}>
            Live rate: 1 KRW = ₱{rate.toFixed(5)}<br/>
            Last updated: {lastUpdated}
          </p>
        )}
      </div>
    </div>
  );
}
